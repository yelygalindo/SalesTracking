name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore SalesTracking.sln

      - name: Build
        run: dotnet build SalesTracking.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SalesTracking.sln --configuration Release --no-build --logger "console;verbosity=normal"
